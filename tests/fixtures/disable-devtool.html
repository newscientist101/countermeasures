<!DOCTYPE html>
<html>
<head>
    <title>Disable-Devtool Test Fixture</title>
</head>
<body>
    <div id="status">INITIAL</div>
    <div id="detection-count">0</div>
    <script>
        // Use manual mode for better test control
        (function() {
            const script = document.createElement('script');
            script.src = 'vendor/disable-devtool.min.js';
            script.onload = () => {
                DisableDevtool({
                    ondevtool: (val) => {
                        document.getElementById('status').innerText = 'DETECTED';
                        document.body.classList.add('detected');
                        console.log('Devtools detected!', val);
                    },
                    interval: 500
                });
            };
            document.head.appendChild(script);
        })();
    </script>
</body>
</html>
