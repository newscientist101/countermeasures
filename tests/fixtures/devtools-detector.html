<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>devtools-detector Real Library Test</title>
</head>
<body>
    <h1>devtools-detector Real Library</h1>
    <div id="status">NOT DETECTED</div>
    <div id="detection-count">0</div>

    <script src="vendor/devtools-detector.js"></script>
    <script>
        let count = 0;
        function setup() {
            if (typeof devtoolsDetector === 'undefined') {
                setTimeout(setup, 100);
                return;
            }
            devtoolsDetector.addListener(function(isOpen, detail) {
                if (isOpen) {
                    count++;
                    document.getElementById('status').innerText = 'DETECTED';
                    document.getElementById('detection-count').innerText = count;
                    document.body.classList.add('detected');
                    console.log('Devtools detected!', detail);
                } else {
                    document.getElementById('status').innerText = 'NOT DETECTED';
                    document.body.classList.remove('detected');
                }
            });
            devtoolsDetector.launch();
        }
        setup();
    </script>
</body>
</html>
