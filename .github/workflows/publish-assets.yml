name: Publish Assets

on:
  workflow_run:
    workflows: ["CI Tests"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Identify Tag
        id: identify_tag
        shell: bash
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Head SHA: $SHA"
          echo "Head Branch: $BRANCH"

          # Use ls-remote to check tags on the remote directly, bypass local fetch issues
          echo "Checking remote tags for SHA $SHA..."
          REMOTE_TAGS=$(git ls-remote --tags origin)

          # Find tag name. For annotated tags, ls-remote returns:
          # <tag-sha> refs/tags/v1.0.0
          # <commit-sha> refs/tags/v1.0.0^{}
          # For lightweight tags, it just returns:
          # <commit-sha> refs/tags/v1.0.0

          # This grep finds any tag name associated with the SHA
          TAG=$(echo "$REMOTE_TAGS" | grep "$SHA" | grep "refs/tags/" | head -n 1 | sed 's|.*/tags/||; s|\^{}||')

          if [ -n "$TAG" ]; then
            echo "Found remote tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            # Local fallback as a last resort
            git fetch --tags --force --all
            TAG_LOCAL=$(git tag --points-at "$SHA" | head -n 1)
            if [ -n "$TAG_LOCAL" ]; then
               echo "Found local tag: $TAG_LOCAL"
               echo "tag=$TAG_LOCAL" >> $GITHUB_OUTPUT
               echo "is_tag=true" >> $GITHUB_OUTPUT
            else
               echo "No tag found for SHA $SHA"
               echo "is_tag=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Skip if not a tag
        if: steps.identify_tag.outputs.is_tag != 'true'
        run: |
          echo "No tag found for this commit. Skipping asset publication."
          exit 0


      - name: Install dependencies
        if: steps.identify_tag.outputs.is_tag == 'true'
        run: npm ci

      - name: Build bookmarklets
        if: steps.identify_tag.outputs.is_tag == 'true'
        run: npm run build

      - name: Bundle bookmarklets
        if: steps.identify_tag.outputs.is_tag == 'true'
        shell: bash
        run: |
          DIST_DIR="dist"
          SRC_DIR="src"
          OUTPUT_FILE="bookmarklets.html"
          NOW=$(date +%s)

          html_escape() {
              printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g; s/'"'"'/\&#39;/g'
          }

          titleize() {
              printf '%s' "$1" | sed -E 's/(^|[[:space:]:-])([a-z])/\1\U\2/g; s/[-_]/ /g'
          }

          cat <<HTML_HEAD > "$OUTPUT_FILE"
          <!DOCTYPE NETSCAPE-Bookmark-file-1>
          <!-- This is an automatically generated file. It will be read and overwritten. DO NOT EDIT! -->
          <META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
          <TITLE>Bookmarks</TITLE>
          <H1>Bookmarks</H1>
          <DL><p>
              <DT><H3 ADD_DATE="$NOW" LAST_MODIFIED="$NOW" PERSONAL_TOOLBAR_FOLDER="true">DevTools Countermeasures</H3>
              <DL><p>
          HTML_HEAD

          process_dir() {
              local current_dir="$1"
              local indent="$2"

              find "$current_dir" -mindepth 1 -maxdepth 1 -type d -not -path "*/utils" | sort | while read -r dir; do
                  if [ -z "$dir" ]; then continue; fi
                  local dir_name=$(basename "$dir")
                  local title=$(titleize "$dir_name")
                  printf "%s    <DT><H3 ADD_DATE=\"%s\" LAST_MODIFIED=\"%s\">%s</H3>\n" "$indent" "$NOW" "$NOW" "$(html_escape "$title")" >> "$OUTPUT_FILE"
                  printf "%s    <DL><p>\n" "$indent" >> "$OUTPUT_FILE"
                  process_dir "$dir" "${indent}    "
                  printf "%s    </DL><p>\n" "$indent" >> "$OUTPUT_FILE"
              done

              find "$current_dir" -mindepth 1 -maxdepth 1 -type f -name "*.js" | sort | while read -r file; do
                  if [ -z "$file" ]; then continue; fi
                  local rel_path=$(python3 -c "import os; print(os.path.relpath('$file', '$SRC_DIR'))")
                  local output_name=$(echo "$rel_path" | sed 's/[/\\]/-/g; s/\.js$/.txt/')
                  local dist_file="$DIST_DIR/$output_name"

                  if [[ -f "$dist_file" ]]; then
                      local title_raw=$(echo "$rel_path" | sed 's/\.js$//; s/[/\\]/ /g')
                      local title=$(titleize "$title_raw")
                      local href=$(cat "$dist_file")
                      printf "%s    <DT><A HREF=\"%s\" ADD_DATE=\"%s\">%s</A>\n" "$indent" "$(html_escape "$href")" "$NOW" "$(html_escape "$title")" >> "$OUTPUT_FILE"
                  fi
              done
          }

          process_dir "$SRC_DIR" "    "

          cat <<HTML_FOOT >> "$OUTPUT_FILE"
              </DL><p>
          </DL><p>
          HTML_FOOT

      - name: Upload Assets to Release
        if: steps.identify_tag.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.identify_tag.outputs.tag }}
          files: bookmarklets.html
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
